<html>
<head>

<style>
body { background:#0f0f0f; color:#fff; font-family:Arial; margin:0; }
.container { max-width:500px; margin:auto; padding:15px; box-shadow:0 0 20px rgba(255,94,0,0.1); border-radius:12px; }
h2 { text-align:center; }

.output {
  height:40vh;
  overflow-y:auto;
  background:#000;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  line-height:1.8;
  font-size:15px;
}

input,button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button {
  background:linear-gradient(45deg, orange, #ff5e00);
  font-weight:bold;
  cursor:pointer;
}

.small { font-size:12px; color:#aaa; text-align:center; margin-top:5px; }
</style>
</head>

<body>

<div class="container">

<div style="text-align:center; margin-bottom:15px;">
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg-VwI2SYcAKJd9poW1FTNoP_z0J1YXtLt26G8548Ro41EVKY9L4EOw_hZx1K1WdiSmeVYdBBB0JDZdDCfF8AEGAh8CiY49VyKij2mPSv8csI6qsr9Admcjzgd53AYmg8Y3u3PtoT1fwIcSQgqgguENrHngiR8AzohGXVgaXcorGoYUGf2JYPCx99bWWA/s1536/file_00000000756c720baec218a6947d616f.jpeg"
style="width:160px; border-radius:12px;">
<p class="small">Used by creators, founders & decision makers who want clarity, not motivation.</p>
</div>

<h2>TruthLoop</h2>
<p class="small">This is not advice. This is confrontation.</p>

<div id="emailScreen">
<input id="emailInput" placeholder="Enter your email to continue"/>
<button onclick="saveEmail()">Start</button>
</div>

<div id="mainApp" style="display:none;">
<div id="outputBox" class="output"></div>

<input id="mainInput" placeholder="Type what is real"/>
<button id="getBtn">Face the truth</button>

<input id="reflectionInput" placeholder="Answer honestly..."/>
<button id="nextBtn">Go deeper</button>
</div>

<p class="small">
Contact: arunbhatt2010@email.com
</p>

</div>

<script>

let messages=[];
let loopLevel=1;

const emailScreen=document.getElementById("emailScreen");
const mainApp=document.getElementById("mainApp");

const outputBox=document.getElementById("outputBox");
const mainInput=document.getElementById("mainInput");
const reflectionInput=document.getElementById("reflectionInput");


// ✅ FORMAT FIX (MAIN BUG SOLVED)
function formatReply(text){
  if(!text) return "<div>⚠️ No response</div>";

  return text
    .split("\n")
    .map(line => `<div style="margin-bottom:10px;">${line}</div>`)
    .join("");
}


// EMAIL
function saveEmail(){
  const email=document.getElementById("emailInput").value.trim();
  if(!email) return alert("Enter email");

  fetch("/api/saveEmail",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ email })
  });

  emailScreen.style.display="none";
  mainApp.style.display="block";
}


// API CALL
async function callAPI(){
  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ messages, loopLevel })
    });

    const data=await res.json();

    console.log("API RESPONSE:", data);

    let reply = data?.reply || "⚠️ Empty reply";

    messages.push({role:"assistant",content:reply});

    return reply;

  }catch(e){
    console.log("ERROR:", e);
    return "⚠️ Connection error";
  }
}


// FIRST QUESTION
document.getElementById("getBtn").onclick = async ()=>{
  const text=mainInput.value.trim();
  if(!text) return;

  messages=[{role:"user",content:text}];

  outputBox.innerHTML = `<b>You:</b> ${text}<br><br>`;

  const reply = await callAPI();

  outputBox.innerHTML += formatReply(reply);

  mainInput.value="";
};


// NEXT LOOP
document.getElementById("nextBtn").onclick = async ()=>{
  const text=reflectionInput.value.trim();
  if(!text) return;

  loopLevel++;

  messages.push({role:"user",content:text});

  outputBox.innerHTML += `<br><b>You:</b> ${text}<br><br>`;

  const reply = await callAPI();

  outputBox.innerHTML += formatReply(reply);

  reflectionInput.value="";
};

</script>

</body>
</html>
