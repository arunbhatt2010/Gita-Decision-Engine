<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TruthLoop</title>

<!-- ✅ GOOGLE ANALYTICS (SAFE) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-RBMQ2F6P9Q"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-RBMQ2F6P9Q');
</script>

<style>
body { background:#0f0f0f; color:#fff; font-family:Arial; margin:0; }
.container { max-width:500px; margin:auto; padding:15px; }
h2 { text-align:center; }

.output {
  height:40vh;
  overflow-y:auto;
  background:#000;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  line-height:1.6;
}

input,button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button {
  background:linear-gradient(45deg, orange, #ff5e00);
  font-weight:bold;
  cursor:pointer;
}

#finalScreen {
  display:none;
  text-align:center;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">
<h2>TruthLoop</h2>

<!-- GOAL -->
<div id="goalScreen">
  <p>Where are you stuck right now?</p>
  <button onclick="selectGoal('Money')">Money</button>
  <button onclick="selectGoal('Clarity')">Clarity</button>
  <button onclick="selectGoal('Consistency')">Consistency</button>
  <button onclick="selectGoal('Overthinking')">Overthinking</button>
</div>

<!-- PROBLEM -->
<div id="problemScreen" style="display:none;">
  <input id="problemInput" placeholder="What’s actually not working?" />
  <button onclick="saveProblem()">Continue</button>
</div>

<!-- ACTION -->
<div id="actionScreen" style="display:none;">
  <input id="actionInput" placeholder="What did you do in last 48 hours?" />
  <button onclick="saveAction()">Start</button>
</div>

<!-- MAIN -->
<div id="mainApp" style="display:none;">
  
  <div id="outputBox" class="output"></div>

  <input id="mainInput" placeholder="Say it clearly. No hiding." />
  <button id="getBtn">Face It</button>

  <input id="reflectionInput" placeholder="Answer honestly..." />
  <button id="nextBtn">Continue</button>

  <button id="payBtn" style="display:none;"></button>

</div>

<!-- FINAL -->
<div id="finalScreen">

  <p>⚠️ You now see the truth.</p>

  <div id="summaryBox" style="background:#000; padding:15px; border-radius:10px;"></div>

  <button id="upgradeBtn">🚀 Get Full Execution Plan (₹299)</button>
  <button id="restartBtn">🔄 Start Again</button>

</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

let userGoal="", userProblem="", userAction="";
let messages=[], loopLevel=1;
let paid49=false, paid99=false;

const goalScreen=document.getElementById("goalScreen");
const problemScreen=document.getElementById("problemScreen");
const actionScreen=document.getElementById("actionScreen");
const mainApp=document.getElementById("mainApp");

const problemInput=document.getElementById("problemInput");
const actionInput=document.getElementById("actionInput");
const mainInput=document.getElementById("mainInput");
const reflectionInput=document.getElementById("reflectionInput");

const outputBox=document.getElementById("outputBox");
const getBtn=document.getElementById("getBtn");
const nextBtn=document.getElementById("nextBtn");
const payBtn=document.getElementById("payBtn");

const finalScreen=document.getElementById("finalScreen");
const summaryBox=document.getElementById("summaryBox");
const restartBtn=document.getElementById("restartBtn");
const upgradeBtn=document.getElementById("upgradeBtn");

function formatReply(text){
  if(!text) return "<div>⚠️ Empty response</div>";
  return text.split("\n").map(l=>`<div style="margin-bottom:12px;">${l}</div>`).join("");
}

// FLOW
window.selectGoal=(v)=>{
  userGoal=v;
  goalScreen.style.display="none";
  problemScreen.style.display="block";

  gtag('event', 'goal_selected', { goal: v });
};

window.saveProblem=()=>{
  userProblem=problemInput.value.trim();
  if(!userProblem) return alert("Enter problem");
  problemScreen.style.display="none";
  actionScreen.style.display="block";
};

window.saveAction=()=>{
  userAction=actionInput.value.trim();
  if(!userAction) return alert("Enter action");
  actionScreen.style.display="none";
  mainApp.style.display="block";
};

// API
async function callAPI(){
  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        messages, loopLevel, userGoal, userProblem, userAction
      })
    });

    const data=await res.json();

    if(!data || !data.reply){
      return "⚠️ No response";
    }

    messages.push({role:"assistant",content:data.reply});
    return data.reply;

  } catch(e){
    return "⚠️ Connection error";
  }
}

// START
getBtn.addEventListener("click", async ()=>{
  const text=mainInput.value.trim();
  if(!text) return;

  loopLevel=1;
  paid49=false;
  paid99=false;

  messages=[{role:"user",content:text}];
  outputBox.innerHTML="⚡ Thinking fast...";

  const reply=await callAPI();

  outputBox.innerHTML=`<b>You:</b> ${text}<br><br>${formatReply(reply)}`;

  gtag('event', 'started_conversation');
});

// CONTINUE
nextBtn.addEventListener("click", async ()=>{
  const text = reflectionInput.value.trim();
  if(!text) return;

  if(loopLevel === 2 && !paid49){
    payBtn.style.display="block";
    payBtn.innerText="⚠️ Go Deeper (₹49)";
    return;
  }

  if(loopLevel === 3 && !paid99){
    payBtn.style.display="block";
    payBtn.innerText="🔥 Get Clear Action (₹99)";
    return;
  }

  if(loopLevel === 4){

    summaryBox.innerHTML = `
    <div style="background:#000; padding:15px; border-radius:10px; text-align:left;">
    You were not stuck.<br><br>
    You were avoiding the real move.<br><br>
    You kept doing what feels safe… but not what actually moves things forward.<br><br>
    You already know what matters.<br>
    You just haven’t acted on it.<br><br>
    Nothing changes from here… unless your actions change.
    </div>
    `;

    finalScreen.style.display="block";
    mainApp.style.display="none";

    gtag('event', 'completed_flow');

    return;
  }

  loopLevel++;

  messages.push({role:"user", content:text});
  outputBox.innerHTML += `<br><b>You:</b> ${text}<br>⚡ Thinking fast...`;

  const reply = await callAPI();

  outputBox.innerHTML += `<br>${formatReply(reply)}`;

  reflectionInput.value="";
});

// PAYMENT
payBtn.addEventListener("click", ()=>{

  if(loopLevel === 2){
    alert("✅ Payment successful");
    paid49=true;
    gtag('event', 'paid_49');
  }

  else if(loopLevel === 3){
    alert("🔥 Payment successful");
    paid99=true;
    gtag('event', 'paid_99');
  }

  payBtn.style.display="none";
});

// RESET
restartBtn.addEventListener("click", ()=>{
  messages=[];
  loopLevel=1;
  paid49=false;
  paid99=false;

  finalScreen.style.display="none";
  mainApp.style.display="block";
  outputBox.innerHTML="";

  mainInput.value="";
  reflectionInput.value="";
});

// CTA
upgradeBtn.addEventListener("click", ()=>{
  alert("🚀 Full system coming soon");
  gtag('event', 'clicked_upgrade');
});

});

</script>

</body>
  </html>
