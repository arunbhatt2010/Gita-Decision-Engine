<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TruthLoop</title>

<style>
body { background:#0f0f0f; color:#fff; font-family:Arial; margin:0; }
.container { max-width:500px; margin:auto; padding:15px; }

.output {
  height:40vh;
  overflow-y:auto;
  background:#000;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

input,button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button {
  background:linear-gradient(45deg, orange, #ff5e00);
}

.small { font-size:12px; color:#aaa; text-align:center; }

.payBtn { background:#ff9800; }
</style>
</head>

<body>

<div class="container">

<h2>TruthLoop</h2>

<div id="emailScreen">
<input id="emailInput" placeholder="Enter your email"/>
<button onclick="saveEmail()">Start</button>
</div>

<div id="mainApp" style="display:none;">
<div id="outputBox" class="output"></div>

<input id="mainInput" placeholder="Type what is real"/>
<button id="getBtn">Face the truth</button>

<input id="reflectionInput" placeholder="Answer honestly..."/>
<button id="nextBtn">Go deeper</button>

<!-- 💰 PAY BUTTONS -->
<button id="pay49" class="payBtn" style="display:none;">Unlock deeper (₹49)</button>
<button id="pay99" class="payBtn" style="display:none;">Unlock full clarity (₹99)</button>

</div>

<!-- 🎯 FINAL SCREEN -->
<div id="finalScreen" style="display:none; text-align:center;">
<p>Now it's clear.</p>

<div style="background:#000; padding:15px; border-radius:10px;">
You were not stuck.<br><br>
You were avoiding the real move.<br><br>
You already know what matters.<br><br>
Now act.
</div>

<button onclick="location.reload()">Start Again</button>
</div>

</div>

<script>

let messages=[];
let loopLevel=1;

const outputBox=document.getElementById("outputBox");

// FORMAT
function formatReply(text){
  return text.split("\n").map(l=>`<div>${l}</div>`).join("");
}

// EMAIL
function saveEmail(){
  document.getElementById("emailScreen").style.display="none";
  document.getElementById("mainApp").style.display="block";
}

// API
async function callAPI(){
  try{
    const res = await fetch("/api/chat",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ messages, loopLevel })
    });

    const data = await res.json();

    // FINAL SCREEN
    if(data.paywall){
      document.getElementById("mainApp").style.display="none";
      document.getElementById("finalScreen").style.display="block";
      return "";
    }

    return data.reply;

  }catch{
    return "⚠️ Error";
  }
}

// FIRST
document.getElementById("getBtn").onclick = async ()=>{
  const text=document.getElementById("mainInput").value.trim();
  if(!text) return;

  messages=[{role:"user",content:text}];

  outputBox.innerHTML=`<b>You:</b> ${text}<br><br>`;

  const reply=await callAPI();
  outputBox.innerHTML+=formatReply(reply);
};

// NEXT
document.getElementById("nextBtn").onclick = async ()=>{
  const text=document.getElementById("reflectionInput").value.trim();
  if(!text) return;

  loopLevel++;

  messages.push({role:"user",content:text});
  outputBox.innerHTML+=`<br><b>You:</b> ${text}<br><br>`;

  const reply=await callAPI();
  outputBox.innerHTML+=formatReply(reply);

  // 💰 STAGE LOGIC
  if(loopLevel === 2){
    document.getElementById("pay49").style.display="block";
  }

  if(loopLevel === 3){
    document.getElementById("pay99").style.display="block";
  }
};

// 💰 FAKE PAYMENT (replace later with Razorpay)
document.getElementById("pay49").onclick = ()=>{
  alert("₹49 paid (demo)");
  document.getElementById("pay49").style.display="none";
};

document.getElementById("pay99").onclick = ()=>{
  alert("₹99 paid (demo)");
  document.getElementById("pay99").style.display="none";
};

</script>

</body>
  </html>
