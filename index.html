<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gita Guidance</title>

<style>
body {
  background:#111;
  color:#fff;
  font-family: Arial;
  padding:15px;
}

.container {
  max-width:500px;
  margin:auto;
}

.chat-box {
  background:#000;
  padding:10px;
  height:300px;
  overflow-y:auto;
  border-radius:8px;
  margin-bottom:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:5px;
  border:none;
}

button {
  width:100%;
  padding:12px;
  margin-top:8px;
  background:orange;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.options {
  margin-top:10px;
}

.option-btn {
  display:inline-block;
  padding:8px 12px;
  margin:5px;
  background:#222;
  border-radius:20px;
  cursor:pointer;
  border:1px solid #444;
}

.option-btn.active {
  background:orange;
  color:#000;
}
  .options {
  margin-top:15px;
  animation: fadeIn 0.4s ease;
}

.option-card {
  background:#1a1a1a;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #333;
  cursor:pointer;
  transition:0.2s;
}

.option-card:hover {
  border-color:orange;
  transform:scale(1.02);
}

.option-card.active {
  background:orange;
  color:#000;
  border-color:orange;
}

.step-title {
  font-size:14px;
  opacity:0.7;
  margin-bottom:8px;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
  }
</style>
</head>

<body>

<div class="container">
  <h2>Gita Guidance</h2>

  <div id="chat" class="chat-box"></div>

  <input id="input" placeholder="Ask your problem..." />

  <button onclick="showOptions()">Next</button>

  <div id="options" class="options" style="display:none;"></div>

  <button id="sendBtn" onclick="sendMessage()" style="display:none;">Get Guidance</button>
</div>

<script>

let selectedCauses = [];

const causes = [
  "Lack of discipline",
  "Overthinking",
  "Distraction",
  "No clear goal",
  "Fear / doubt",
  "Procrastination",
  "Low confidence",
  "No routine",
  "Mental fatigue",
  "Too many goals"
  chat.innerHTML = `
<div style="opacity:0.7;">
You don’t need more advice.  
You need clarity.
</div>

];

function showOptions() {
  const input = document.getElementById("input").value.trim();
  if (!input) return;

  const optionsDiv = document.getElementById("options");

  optionsDiv.innerHTML = `
    <div class="step-title">Step 2: What could be the real reason?</div>
  `;

  causes.forEach(cause => {
    const card = document.createElement("div");
    card.className = "option-card";
    card.innerText = cause;

    card.onclick = () => {
      card.classList.toggle("active");

      if (selectedCauses.includes(cause)) {
        selectedCauses = selectedCauses.filter(c => c !== cause);
      } else {
        selectedCauses.push(cause);
      }
    };

    optionsDiv.appendChild(card);
  });

  optionsDiv.style.display = "block";
  document.getElementById("sendBtn").style.display = "block";
  }

    optionsDiv.appendChild(btn);
  });

  optionsDiv.style.display = "block";
  document.getElementById("sendBtn").style.display = "block";
}

async function sendMessage() {
  const input = document.getElementById("input").value.trim();
  const chat = document.getElementById("chat");

  if (!input) return;

  chat.innerHTML += `<div><b>You:</b> ${input}</div>`;

  chat.innerHTML += `<div style="opacity:0.7;">Analyzing...</div>`;

  const response = await fetch("/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      messages: [
        { role: "user", content: input },
        { role: "system", content: "CAUSES: " + selectedCauses.join(", ") }
      ]
    })
  });

  const data = await response.json();

  chat.innerHTML += `<div><b>Guide:</b> ${data.reply}</div>`;

  document.getElementById("input").value = "";
  document.getElementById("options").style.display = "none";
  document.getElementById("sendBtn").style.display = "none";
  selectedCauses = [];

  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
