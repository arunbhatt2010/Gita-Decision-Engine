<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gita Decision Engine</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  display: flex;
  justify-content: center;
  padding-top: 40px;
}

.container {
  width: 350px;
  background: #1c1c1c;
  padding: 20px;
  border-radius: 10px;
}

.chat-box {
  background: #000;
  padding: 10px;
  height: 300px;
  overflow-y: auto;
  margin-bottom: 10px;
  border-radius: 5px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-bottom: 5px;
  border-radius: 5px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  background: orange;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h2>Gita Guidance</h2>

  <div id="chat" class="chat-box"></div>

  <select id="lang">
    <option value="english">English</option>
    <option value="hindi">Hindi</option>
    <option value="both">Hindi + English</option>
  </select>

  <input id="input" placeholder="Ask your problem..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
let messages = [];
const DEV_MODE = true; // true = unlimited access
// 🔒 MONETIZATION LOCK
let questionCount = localStorage.getItem("count") || 0;
questionCount = parseInt(questionCount);
if (!DEV_MODE && questionCount >= 3) {

async function sendMessage() {
  const inputBox = document.getElementById("input");
  const chat = document.getElementById("chat");
  const text = inputBox.value.trim();

  if (!text) return;

  // 🔒 LIMIT CHECK
  if (questionCount >= LIMIT) {
    chat.innerHTML += `
      <div style="color: orange;">
      🔒 Truth stops here.<br><br>
      You don’t need more answers.<br>
      You need commitment.<br><br>
      Unlock deeper guidance →
      </div>
    `;
    return;
  }

  // user message
  chat.innerHTML += `<div><b>You:</b> ${text}</div>`;
  inputBox.value = "";

  messages.push({ role: "user", content: text });

  // 🔥 MEMORY CONTROL (important)
  messages = messages.slice(-6);

  chat.innerHTML += `<div><b>Guide:</b> Thinking...</div>`;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        messages: messages,
        lang: document.getElementById("lang").value
      }),
    });

    const data = await res.json();
    const reply = data.reply || "No response";

    // add AI response to memory
    messages.push({ role: "assistant", content: reply });

    // replace thinking text
    chat.innerHTML = chat.innerHTML.replace("Thinking...", reply);

    // 🔒 UPDATE COUNT
    questionCount++;
    localStorage.setItem("count", questionCount);

  } catch (err) {
    chat.innerHTML = chat.innerHTML.replace("Thinking...", "Error connecting to AI");
  }
}
</script>

</body>
</html>
