<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gita Guidance</title>

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family:Arial;
  margin:0;
}

.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

h2{text-align:center;}

.chat-box{
  height:45vh;
  overflow-y:auto;
  background:#000;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

select,input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}

.primary-btn{
  width:100%;
  padding:14px;
  margin-top:10px;
  background:linear-gradient(45deg, orange, #ff5e00);
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.option-card{
  background:#1a1a1a;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #333;
  cursor:pointer;
}

.option-card.active{
  background:orange;
  color:#000;
}

.voice-btn{
  position:absolute;
  right:10px;
  top:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Gita Guidance</h2>

<div id="chat" class="chat-box">
<div style="opacity:0.7;">
You don’t need more advice.<br>
You need clarity.
</div>
</div>

<select id="lang">
<option value="en">English</option>
<option value="hi">Hindi</option>
</select>

<div style="position:relative;">
<input id="input" placeholder="What's really bothering you..." />
<span class="voice-btn" onclick="startVoice()">🎤</span>
</div>
<button class="primary-btn" onclick="sendMessage()">
Understand my problem
</button>
</div>

<script>
let selectedCauses = [];
let responseCount = 0;
let loopStep = 0;

const causes = [
"Procrastination",
"Overthinking",
"Distraction",
"No clear goal",
"Fear / doubt",
"Low confidence",
"No routine",
"Mental fatigue"
];


}

async function sendMessage(deep=false){

if(responseCount>=2 && !deep){
alert("Unlock premium for deeper guidance 🔒");
return;
}

const input=document.getElementById("input").value.trim();
const lang=document.getElementById("lang").value;
const chat=document.getElementById("chat");

if(!input)return;

loopStep++;

let mode="INITIAL";
if(loopStep===2) mode="DEEPER";
if(loopStep>=3) mode="CORE";

chat.innerHTML+=`<div><b>You:</b> ${input}</div>`;
chat.innerHTML+=`<div style="opacity:0.6;">Thinking...</div>`;

const response=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
messages:[
{
role:"system",
content:`
User problem: ${input}
Language: ${lang}
Selected causes: auto-detect from problem
Conversation step: ${mode}

Rules:
- Answer in selected language
- Keep response short
- Max 4–5 lines per section
- No long paragraphs
- Must ask 1 deep question
- Never skip question
- Hide reasoning (deep insight internal only)
`
}
]
})
});

const data=await response.json();

chat.innerHTML+=`<div><b>Guide:</b><br>${data.reply}</div>

<div onclick="sendMessage(true)" style="opacity:0.6;cursor:pointer;">
Unlock deeper insight →
</div>
`;

if(loopStep>=3) loopStep=0;

responseCount++;

document.getElementById("input").value="";
document.getElementById("options").style.display="none";
document.getElementById("sendBtn").style.display="none";

chat.scrollTop=chat.scrollHeight;
}

function startVoice(){
const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
const lang=document.getElementById("lang").value;

recognition.lang=lang==="hi"?"hi-IN":"en-US";

recognition.start();

recognition.onresult=(e)=>{
document.getElementById("input").value=e.results[0][0].transcript;
};
}
</script>

</body>
  </html>
