<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gita Guidance</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  display: flex;
  justify-content: center;
  padding-top: 40px;
}

.container {
  width: 350px;
  background: #1c1c1c;
  padding: 20px;
  border-radius: 10px;
}

.chat-box {
  background: #000;
  padding: 10px;
  height: 320px;
  overflow-y: auto;
  margin-bottom: 10px;
  border-radius: 5px;
  font-size: 14px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-bottom: 5px;
  border-radius: 5px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  background: orange;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
h3 {
  margin: 8px 0 4px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Gita Guidance</h2>

  <div id="chat" class="chat-box"></div>

  <select id="lang">
    <option value="english">English</option>
    <option value="hindi">Hindi</option>
    <option value="both">Hindi + English</option>
  </select>

  <input id="input" placeholder="Ask your problem..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
let messages = [];

// 🔥 DEV MODE (TRUE = UNLIMITED)
const DEV_MODE = true;
const LIMIT = 3;

// 🔁 RESET SUPPORT
if (window.location.search.includes("reset=true")) {
  localStorage.removeItem("count");
}

// 🔒 COUNTER
let questionCount = DEV_MODE ? 0 : (localStorage.getItem("count") || 0);
questionCount = parseInt(questionCount);

// 🧠 SYSTEM PROMPT
const systemPrompt = `
You are a sharp, no-BS life advisor inspired by Bhagavad Gita.

Respond in CLEAN HTML format.

Structure:

<h3>🧠 Truth (Gita Insight)</h3>
<p>2 lines max. Occasionally reference Krishna or detachment.</p>

<h3>🔍 Pattern</h3>
<p>2 lines max about behavior</p>

<h3>⚡ Action (Karma Step)</h3>
<ul>
<li>Step 1</li>
<li>Step 2</li>
</ul>

<h3>❓ Question</h3>
<p>1 deep question</p>

Rules:
- Mobile friendly
- No long paragraphs
- No generic advice
- No spiritual nonsense words
- Be direct, real, sharp
`;

async function sendMessage() {

  const inputBox = document.getElementById("input");
  const chat = document.getElementById("chat");
  const lang = document.getElementById("lang").value;
  const text = inputBox.value.trim();

  if (!text) return;

  // 🔒 LIMIT CHECK
  if (!DEV_MODE && questionCount >= LIMIT) {
    chat.innerHTML += `
    <div style="color: orange;">
      🔒 Truth stops here.<br><br>
      You don’t need more answers.<br>
      You need commitment.<br><br>
      Unlock deeper guidance →
    </div>`;
    return;
  }

  // 👤 USER MESSAGE
  chat.innerHTML += `<div><b>You:</b> ${text}</div>`;
  inputBox.value = "";

  messages.push({ role: "user", content: text });

  // 🤖 THINKING
  chat.innerHTML += `<div id="loading"><b>Guide:</b> Thinking...</div>`;

  try {

    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages: [
          { role: "system", content: systemPrompt },
          ...messages
        ],
        lang: lang
      })
    });

    const data = await res.json();

    const reply = data.reply || "No response";

    messages.push({ role: "assistant", content: reply });

    document.getElementById("loading").remove();

    chat.innerHTML += `<div><b>Guide:</b> ${reply}</div>`;

    // 🔢 COUNT UPDATE
    questionCount++;
    localStorage.setItem("count", questionCount);

  } catch (err) {
    document.getElementById("loading").innerText = "Error";
  }
}
</script>

</body>
</html>
