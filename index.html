<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<title>TruthLoop</title>

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family:Arial;
  margin:0;
}
.container {
  max-width:500px;
  margin:auto;
  padding:15px;
}
h2 {
  text-align:center;
}
.output {
  height:45vh;
  overflow-y:auto;
  background:#000;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}
input {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}
button {
  width:100%;
  padding:14px;
  margin-top:10px;
  background:linear-gradient(45deg, orange, #ff5e00);
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>TruthLoop</h2>

<div id="outputBox" class="output"></div>

<input id="mainInput" placeholder="What's really bothering you..." />
<button id="getBtn">Get Clarity</button>

<input id="reflectionInput" placeholder="Answer honestly..." />

<button onclick="startPayment()">🔒 Go Deeper (₹19)</button>

</div>

<script>

// ELEMENTS
const input = document.getElementById("mainInput");
const reflectionInput = document.getElementById("reflectionInput");
const outputBox = document.getElementById("outputBox");
const getBtn = document.getElementById("getBtn");

let messages = [];
let loopLevel = 1;

// 🔥 PAYMENT (FINAL FIXED)
async function startPayment() {
  try {
    const res = await fetch("/api/create-order", { method: "POST" });

    if (!res.ok) throw new Error("Order API failed");

    const data = await res.json();

    if (!data.id || !data.key) {
      throw new Error("Invalid order data");
    }

    const options = {
      key: data.key,
      amount: data.amount,
      currency: "INR",
      name: "TruthLoop",
      description: "Unlock Deep Clarity",
      order_id: data.id,

      handler: async function (response) {
        console.log("✅ Payment success", response);

        try {
          await unlockDeepLoop();
        } catch (e) {
          console.error("Unlock error:", e);
          alert("Payment done but unlock failed");
        }
      },

      modal: {
        ondismiss: function () {
          console.log("❌ Payment popup closed");
        }
      },

      theme: {
        color: "#ff5e00"
      }
    };

    const rzp = new Razorpay(options);
    rzp.open();

  } catch (err) {
    console.error(err);
    alert("Payment failed: " + err.message);
  }
}

// ✅ API CALL (STABLE)
async function callAPI() {
  try {
    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ messages, loopLevel })
    });

    if (!res.ok) throw new Error("API failed");

    const data = await res.json();

    if (!data.reply) throw new Error("Empty response");

    messages.push({ role: "assistant", content: data.reply });

    return data.reply;

  } catch (err) {
    console.error(err);
    return "⚠️ AI unstable. Try again.";
  }
}

// 🔓 DEEP LOOP (FINAL SAFE)
async function unlockDeepLoop() {
  try {
    const userText = reflectionInput.value.trim();

    if (!userText) {
      outputBox.innerHTML += "<br><br>⚠️ Enter reflection first";
      return;
    }

    messages.push({ role: "user", content: userText });

    outputBox.innerHTML += "<br><br><i>Going deeper...</i>";

    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ messages, loopLevel: 2 })
    });

    if (!res.ok) throw new Error("Deep API failed");

    const data = await res.json();

    if (!data.reply) {
      outputBox.innerHTML += "<br><br>⚠️ No response";
      return;
    }

    outputBox.innerHTML += `<br><br>${data.reply}`;

  } catch (err) {
    console.error(err);
    outputBox.innerHTML += "<br><br>⚠️ Error loading deep response";
  }
}

// FIRST CALL
getBtn.addEventListener("click", async () => {

  const userText = input.value.trim();
  if (!userText) return;

  loopLevel = 1;
  messages = [{ role: "user", content: userText }];

  outputBox.innerHTML = "Thinking...";

  const reply = await callAPI();

  outputBox.innerHTML = `
    <b>You:</b> ${userText}<br><br>
    ${reply}
  `;
});

</script>

</body>
  </html>
