<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TruthLoop</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-RBMQ2F6P9Q"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-RBMQ2F6P9Q');

<style>
body { background:#0f0f0f; color:#fff; font-family:Arial; margin:0; }
.container { max-width:500px; margin:auto; padding:15px; }
h2 { text-align:center; }
.output {
  height:45vh; overflow-y:auto; background:#000;
  padding:15px; border-radius:12px; margin-bottom:10px;
}
input,button {
  width:100%; padding:12px; margin-top:10px;
  border-radius:8px; border:none;
}
button {
  background:linear-gradient(45deg, orange, #ff5e00);
  font-weight:bold; cursor:pointer;
}
#finalScreen {
  display:none;
  text-align:center;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">
<h2>TruthLoop</h2>

<!-- GOAL -->
<div id="goalScreen">
  <p>Where are you stuck?</p>
  <button onclick="selectGoal('Money')">Money</button>
  <button onclick="selectGoal('Clarity')">Clarity</button>
  <button onclick="selectGoal('Consistency')">Consistency</button>
  <button onclick="selectGoal('Overthinking')">Overthinking</button>
</div>

<!-- PROBLEM -->
<div id="problemScreen" style="display:none;">
  <input id="problemInput" placeholder="What’s not working?" />
  <button onclick="saveProblem()">Next</button>
</div>

<!-- ACTION -->
<div id="actionScreen" style="display:none;">
  <input id="actionInput" placeholder="What did you do?" />
  <button onclick="saveAction()">Start</button>
</div>

<!-- MAIN -->
<div id="mainApp" style="display:none;">
  <div id="outputBox" class="output"></div>

  <input id="mainInput" placeholder="Say it clearly." />
  <button id="getBtn">Face It</button>

  <input id="reflectionInput" placeholder="Answer honestly..." />
  <button id="nextBtn">Continue</button>

  <button id="payBtn" style="display:none;"></button>
</div>

<!-- FINAL SCREEN -->
<div id="finalScreen">
  <p>✅ This conversation is complete.</p>

  <div id="summaryBox" style="background:#000; padding:15px; border-radius:10px;"></div>

  <button id="upgradeBtn">🚀 Unlock Full System (₹299)</button>
  <button id="restartBtn">🔄 Start New Conversation</button>
</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

let userGoal="", userProblem="", userAction="";
let messages=[], loopLevel=1;
let paid49=false, paid99=false;

const goalScreen=document.getElementById("goalScreen");
const problemScreen=document.getElementById("problemScreen");
const actionScreen=document.getElementById("actionScreen");
const mainApp=document.getElementById("mainApp");

const problemInput=document.getElementById("problemInput");
const actionInput=document.getElementById("actionInput");
const mainInput=document.getElementById("mainInput");
const reflectionInput=document.getElementById("reflectionInput");

const outputBox=document.getElementById("outputBox");
const getBtn=document.getElementById("getBtn");
const nextBtn=document.getElementById("nextBtn");
const payBtn=document.getElementById("payBtn");

const finalScreen=document.getElementById("finalScreen");
const summaryBox=document.getElementById("summaryBox");
const restartBtn=document.getElementById("restartBtn");
const upgradeBtn=document.getElementById("upgradeBtn");

function formatReply(text){
  return text.split("\n").map(l=>`<div>${l}</div>`).join("");
}

// FLOW
window.selectGoal=(v)=>{
  userGoal=v;
  goalScreen.style.display="none";
  problemScreen.style.display="block";
};

window.saveProblem=()=>{
  userProblem=problemInput.value.trim();
  if(!userProblem) return alert("Enter problem");
  problemScreen.style.display="none";
  actionScreen.style.display="block";
};

window.saveAction=()=>{
  userAction=actionInput.value.trim();
  if(!userAction) return alert("Enter action");
  actionScreen.style.display="none";
  mainApp.style.display="block";
};

// API
async function callAPI(){
  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        messages, loopLevel, userGoal, userProblem, userAction
      })
    });

    const data=await res.json();

    if(!data || !data.reply){
      return "⚠️ No response";
    }

    messages.push({role:"assistant",content:data.reply});
    return data.reply;

  } catch(e){
    return "⚠️ Connection error";
  }
}

// LOOP 1
getBtn.addEventListener("click", async ()=>{
  const text=mainInput.value.trim();
  if(!text) return;

  loopLevel=1;
  paid49=false;
  paid99=false;

  messages=[{role:"user",content:text}];
  outputBox.innerHTML="⏳ Thinking...";

  const reply=await callAPI();

  outputBox.innerHTML=`<b>You:</b> ${text}<br><br>${formatReply(reply)}`;
});

// NEXT LOOP
nextBtn.addEventListener("click", async ()=>{
  const text = reflectionInput.value.trim();
  if(!text) return;

  // 🔒 LOCK ₹49
  if(loopLevel === 2 && !paid49){
    payBtn.style.display="block";
    payBtn.innerText="⚠️ Unlock Clarity (₹49)";
    return;
  }

  // 🔒 LOCK ₹99
  if(loopLevel === 3 && !paid99){
    payBtn.style.display="block";
    payBtn.innerText="🔥 Unlock Full Execution (₹99)";
    return;
  }

  // 🛑 FINAL STOP
  if(loopLevel === 4){
    summaryBox.innerHTML = `
      <b>Your Pattern:</b><br>
      You avoid execution and delay decisions.<br><br>

      <b>What you need:</b><br>
      Direct action + accountability.<br><br>

      <b>Next Step:</b><br>
      Upgrade for full execution system.
    `;

    finalScreen.style.display="block";
    mainApp.style.display="none";
    return;
  }

  loopLevel++;

  messages.push({role:"user", content:text});
  outputBox.innerHTML += `<br><b>You:</b> ${text}<br>⏳ Thinking...`;

  const reply = await callAPI();

  outputBox.innerHTML = outputBox.innerHTML.replace("⏳ Thinking...", formatReply(reply));

  reflectionInput.value="";
});

// PAYMENT
payBtn.addEventListener("click", ()=>{

  if(loopLevel === 2){
    alert("✅ ₹49 Payment Success");
    paid49=true;
  }

  else if(loopLevel === 3){
    alert("🔥 ₹99 Payment Success");
    paid99=true;
  }

  payBtn.style.display="none";
});

// RESTART
restartBtn.addEventListener("click", ()=>{
  messages=[];
  loopLevel=1;
  paid49=false;
  paid99=false;

  finalScreen.style.display="none";
  mainApp.style.display="block";
  outputBox.innerHTML="";

  mainInput.value="";
  reflectionInput.value="";
});

// CTA
upgradeBtn.addEventListener("click", ()=>{
  alert("🚀 ₹299 Upgrade coming soon");
});

});

</script>

</body>
  </html>
