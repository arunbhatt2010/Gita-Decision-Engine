<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
<title>TruthLoop</title>

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family:Arial;
  margin:0;
}
.container {
  max-width:500px;
  margin:auto;
  padding:15px;
}
h2 {
  text-align:center;
}
.output {
  height:45vh;
  overflow-y:auto;
  background:#000;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}
input {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}
button {
  width:100%;
  padding:14px;
  margin-top:10px;
  background:linear-gradient(45deg, orange, #ff5e00);
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>TruthLoop</h2>

<!-- KYC -->
<div id="goalScreen">
  <p>Where are you stuck right now and avoiding fixing it?</p>
  <p style="font-size:12px;opacity:0.7;">Pick the one you keep ignoring.</p>

  <button onclick="selectGoal('Money stuck / not growing')">Money stuck / not growing</button>
  <button onclick="selectGoal('No clarity, just confusion')">No clarity, just confusion</button>
  <button onclick="selectGoal('Keep starting, can’t stay consistent')">Keep starting, can’t stay consistent</button>
  <button onclick="selectGoal('Overthinking, no action')">Overthinking, no action</button>
  <button onclick="selectGoal('Something else')">Something else</button>
</div>

<div id="problemScreen" style="display:none;">
  <input id="problemInput" placeholder="What’s actually not working?" />
  <button onclick="saveProblem()">Next</button>
</div>

<div id="actionScreen" style="display:none;">
  <input id="actionInput" placeholder="What did you do in last 48 hours?" />
  <button onclick="saveAction()">Start</button>
</div>

<!-- MAIN -->
<div id="mainApp" style="display:none;">

<div id="outputBox" class="output"></div>

<input id="mainInput" placeholder="What's really bothering you..." />
<button id="getBtn">Get Clarity</button>

<input id="reflectionInput" placeholder="Answer honestly..." />
<button id="nextBtn">Next</button>

<button id="payBtn" style="display:none;">⚠️ Show Me The Real Problem (₹19)</button>

</div>

</div>

<script>
const goalScreen = document.getElementById("goalScreen");
const problemScreen = document.getElementById("problemScreen");
const actionScreen = document.getElementById("actionScreen");
const mainApp = document.getElementById("mainApp");

const problemInput = document.getElementById("problemInput");
const actionInput = document.getElementById("actionInput");
const mainInput = document.getElementById("mainInput");
const reflectionInput = document.getElementById("reflectionInput");
// CONTEXT
let userGoal = "";
let userProblem = "";
let userAction = "";

let isPaid = true;

// DEVICE
let deviceId = localStorage.getItem("deviceId");
if (!deviceId) {
  deviceId = "device_" + Math.random().toString(36).substring(2);
  localStorage.setItem("deviceId", deviceId);
}

// ELEMENTS
const outputBox = document.getElementById("outputBox");
const getBtn = document.getElementById("getBtn");
const nextBtn = document.getElementById("nextBtn");
const payBtn = document.getElementById("payBtn");

let messages = [];
let loopLevel = 1;

// RESET DAILY LIMIT
let freeCount = parseInt(localStorage.getItem("freeCount_" + deviceId)) || 0;
const today = new Date().toDateString();
const lastDate = localStorage.getItem("date_" + deviceId);

if (lastDate !== today) {
  freeCount = 0;
  localStorage.setItem("date_" + deviceId, today);
  localStorage.setItem("freeCount_" + deviceId, 0);
}

// KYC
function selectGoal(val) {
  userGoal = val;
  goalScreen.style.display = "none";
  problemScreen.style.display = "block";
}

function saveProblem() {
  const val = problemInput.value.trim();
  if (!val) return alert("Enter problem");

  userProblem = val;
  problemScreen.style.display = "none";
  actionScreen.style.display = "block";
}

function saveAction() {
  const val = actionInput.value.trim();
  if (!val) return alert("Enter action");

  userAction = val;
  actionScreen.style.display = "none";
  mainApp.style.display = "block";
}

// FORMAT
function formatReply(text) {
  return text
    .replace(/Guide:/g, "<br><br><b>Guide:</b><br>")
    .replace(/Pattern:/g, "<br><br><b>Pattern:</b><br>")
    .replace(/Action:/g, "<br><br><b>Action:</b><br>")
    .replace(/Hint:/g, "<br><br><b>Hint:</b><br>")
    .replace(/Question:/g, "<br><br><b>Question:</b><br>")
    .replace(/\n- /g, "<br>• ")
    .replace(/\n/g, "<br>");
}

// API
async function callAPI() {
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages,
        loopLevel,
        userGoal,
        userProblem,
        userAction
      })
    });

    const data = await res.json();

    messages.push({ role: "assistant", content: data.reply });

    return data.reply;

  } catch (e) {
    console.error(e);
    return "⚠️ AI error";
  }
}

// FIRST CLICK
getBtn.addEventListener("click", async () => {

  const userText = mainInput.value.trim();
  if (!userText) return;

  loopLevel = 1;
  messages = [{ role: "user", content: userText }];

  outputBox.innerHTML = "Thinking...";

  const reply = await callAPI();

  outputBox.innerHTML = `
    <b>You:</b> ${userText}<br><br>
    ${formatReply(reply)}
  `;
});

// NEXT LOOP (IMPORTANT FIX 🔥)
nextBtn.addEventListener("click", async () => {

  const userText = reflectionInput.value.trim();
  if (!userText) return;

  loopLevel++; // 🔥 loop increase

  messages.push({ role: "user", content: userText });

  outputBox.innerHTML += `<br><br><b>You:</b> ${userText}<br>Thinking...`;

  const reply = await callAPI();

  outputBox.innerHTML += `<br>${formatReply(reply)}`;

  reflectionInput.value = "";

});

</script>

</body>
  </html>
