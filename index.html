<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TruthLoop</title>

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family:Arial;
  margin:0;
}
.container {
  max-width:500px;
  margin:auto;
  padding:15px;
}
.chat-box {
  height:50vh;
  overflow-y:auto;
  background:#000;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}
input, textarea {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}
button {
  width:100%;
  padding:14px;
  margin-top:10px;
  background:linear-gradient(45deg, orange, #ff5e00);
  border:none;
  border-radius:10px;
  font-weight:bold;
}
.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h2>TruthLoop</h2>

<div id="chat" class="chat-box"></div>

<input id="input" placeholder="What's really bothering you..." />

<button onclick="send()">Get Clarity</button>

<textarea id="reflection" class="hidden" placeholder="Answer honestly..."></textarea>
<button id="reflectBtn" class="hidden" onclick="nextStep()">Continue</button>

<textarea id="action" class="hidden" placeholder="What will you do in next 24 hours?"></textarea>
<button id="actionBtn" class="hidden" onclick="saveAction()">Commit Action</button>

</div>

<script>

let lastPattern = "";
let repeatCount = 0;

async function send(){

  const input = document.getElementById("input").value;
  const chat = document.getElementById("chat");

  if(!input) return;

  chat.innerHTML += `<div><b>You:</b> ${input}</div>`;
  chat.innerHTML += `<div>Thinking...</div>`;

  const res = await fetch("/api/chat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      messages:[{ role:"user", content:input }]
    })
  });

  const data = await res.json();

  chat.innerHTML += `<div>${data.reply}</div>`;

  // Show reflection lock
  document.getElementById("reflection").classList.remove("hidden");
  document.getElementById("reflectBtn").classList.remove("hidden");
}

function nextStep(){

  const reflection = document.getElementById("reflection").value;
  const chat = document.getElementById("chat");

  if(!reflection){
    alert("You skipped the hard part.");
    return;
  }

  chat.innerHTML += `<div><b>You (Reflection):</b> ${reflection}</div>`;

  document.getElementById("action").classList.remove("hidden");
  document.getElementById("actionBtn").classList.remove("hidden");
}

function saveAction(){

  const action = document.getElementById("action").value;
  const chat = document.getElementById("chat");

  if(!action){
    alert("No action = no change.");
    return;
  }

  chat.innerHTML += `<div><b>Committed Action:</b> ${action}</div>`;
  chat.innerHTML += `<div>Clarity done. Execution pending.</div>`;

}

</script>

</body>
</html>
