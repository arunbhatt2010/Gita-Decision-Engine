<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TruthLoop</title>

<!-- 🔥 GOOGLE ANALYTICS -->

window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family:Arial;
  margin:0;
}
.container {
  max-width:500px;
  margin:auto;
  padding:15px;
}
h2 { text-align:center; }
.output {
  height:45vh;
  overflow-y:auto;
  background:#000;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  line-height:1.6;
  font-size:15px;
}
input {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}
button {
  width:100%;
  padding:14px;
  margin-top:10px;
  background:linear-gradient(45deg, orange, #ff5e00);
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>TruthLoop</h2>

<!-- GOAL -->
<div id="goalScreen">
  <p>Where are you stuck right now and avoiding fixing it?</p>
  <button onclick="selectGoal('Money stuck')">Money stuck</button>
  <button onclick="selectGoal('No clarity')">No clarity</button>
  <button onclick="selectGoal('Consistency issue')">Consistency issue</button>
  <button onclick="selectGoal('Overthinking')">Overthinking</button>
</div>

<!-- PROBLEM -->
<div id="problemScreen" style="display:none;">
  <input id="problemInput" placeholder="What’s actually not working?" />
  <button onclick="saveProblem()">Next</button>
</div>

<!-- ACTION -->
<div id="actionScreen" style="display:none;">
  <input id="actionInput" placeholder="What did you do in last 48 hours?" />
  <button onclick="saveAction()">Start</button>
</div>

<!-- MAIN -->
<div id="mainApp" style="display:none;">
  <div id="outputBox" class="output"></div>

  <input id="mainInput" placeholder="Say it clearly." />
  <button id="getBtn">Face It</button>

  <input id="reflectionInput" placeholder="Answer honestly..." />
  <button id="nextBtn">Continue</button>

  <button id="payBtn" style="display:none;"></button>
  <button id="newSessionBtn" style="display:none;">🔄 Start New</button>
</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

let userGoal="", userProblem="", userAction="";
let messages=[], loopLevel=1;

// 🔥 PAYMENT STATES
let paid49=false;
let paid99=false;

const goalScreen=document.getElementById("goalScreen");
const problemScreen=document.getElementById("problemScreen");
const actionScreen=document.getElementById("actionScreen");
const mainApp=document.getElementById("mainApp");

const problemInput=document.getElementById("problemInput");
const actionInput=document.getElementById("actionInput");
const mainInput=document.getElementById("mainInput");
const reflectionInput=document.getElementById("reflectionInput");

const outputBox=document.getElementById("outputBox");
const getBtn=document.getElementById("getBtn");
const nextBtn=document.getElementById("nextBtn");
const payBtn=document.getElementById("payBtn");
const newSessionBtn=document.getElementById("newSessionBtn");

// FORMAT
function formatReply(text){
  return text.split("\n")
    .map(line=>`<div style="margin-bottom:12px;">${line}</div>`)
    .join("");
}

// FLOW
window.selectGoal=(v)=>{
  userGoal=v;
  goalScreen.style.display="none";
  problemScreen.style.display="block";
};

window.saveProblem=()=>{
  userProblem=problemInput.value.trim();
  if(!userProblem) return alert("Enter problem");
  problemScreen.style.display="none";
  actionScreen.style.display="block";
};

window.saveAction=()=>{
  userAction=actionInput.value.trim();
  if(!userAction) return alert("Enter action");
  actionScreen.style.display="none";
  mainApp.style.display="block";
};

// API
async function callAPI(){
  const res=await fetch("/api/chat",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      messages, loopLevel, userGoal, userProblem, userAction
    })
  });

  const data=await res.json();
  messages.push({role:"assistant",content:data.reply});

  // 🔥 PAYWALL CONTROL
  if(loopLevel===2 && !paid49){
    payBtn.style.display="block";
    payBtn.innerText="⚠️ Unlock Clarity (₹49)";
    nextBtn.disabled=true;
  }

  if(loopLevel===3 && paid49 && !paid99){
    payBtn.style.display="block";
    payBtn.innerText="🔥 Unlock Full Execution (₹99)";
    nextBtn.disabled=true;
  }

  return data.reply;
}

// LOOP 1
getBtn.addEventListener("click",async()=>{
  const text=mainInput.value.trim();
  if(!text) return;

  loopLevel=1;
  paid49=false;
  paid99=false;

  messages=[{role:"user",content:text}];
  outputBox.innerHTML="";

  const reply=await callAPI();
  outputBox.innerHTML=`<b>You:</b> ${text}<br><br>${formatReply(reply)}`;
});

// LOOP 2–4
nextBtn.addEventListener("click",async()=>{
  const text=reflectionInput.value.trim();
  if(!text) return;

  // 🔒 LOCKS
  if(loopLevel===2 && !paid49){
    alert("Unlock ₹49 first");
    return;
  }

  if(loopLevel===3 && !paid99){
    alert("Unlock ₹99 first");
    return;
  }

  loopLevel++;
  messages.push({role:"user",content:text});

  outputBox.innerHTML+=`<br><b>You:</b> ${text}<br>`;
  const reply=await callAPI();

  outputBox.innerHTML+=formatReply(reply);
  reflectionInput.value="";
});

// 💰 PAYMENT (TEST MODE)
payBtn.addEventListener("click",()=>{

  if(loopLevel===2){
    alert("✅ ₹49 success");
    paid49=true;
  }

  else if(loopLevel===3){
    alert("🔥 ₹99 success");
    paid99=true;
  }

  payBtn.style.display="none";
  nextBtn.disabled=false;
});

// RESET
newSessionBtn.addEventListener("click",()=>{
  messages=[];
  loopLevel=1;
  paid49=false;
  paid99=false;

  outputBox.innerHTML="";
  payBtn.style.display="none";
});

});

</script>

</body>
  </html>
