<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TruthLoop</title>

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family:Arial;
  margin:0;
}

.container {
  max-width:500px;
  margin:auto;
  padding:15px;
}

h2 {
  text-align:center;
}

.output {
  height:45vh;
  overflow-y:auto;
  background:#000;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

input {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}

button {
  width:100%;
  padding:14px;
  margin-top:10px;
  background:linear-gradient(45deg, orange, #ff5e00);
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>TruthLoop</h2>

<!-- OUTPUT -->
<div id="outputBox" class="output"></div>

<!-- USER INPUT -->
<input id="mainInput" placeholder="What's really bothering you..." />
<button id="getBtn">Get Clarity</button>

<!-- REFLECTION -->
<input id="reflectionInput" placeholder="Answer honestly..." />
<button id="continueBtn">Continue</button>

</div>

<script>

// 🔹 ELEMENTS
const input = document.getElementById("mainInput");
const reflectionInput = document.getElementById("reflectionInput");
const outputBox = document.getElementById("outputBox");
const getBtn = document.getElementById("getBtn");
const continueBtn = document.getElementById("continueBtn");

let messages = [];
let loopLevel = 1;

// 🔥 VALIDATION
function isValidCommitment(text) {
  return (
    text.length > 20 &&
    (text.match(/\d/) || text.toLowerCase().includes("am") || text.toLowerCase().includes("pm")) &&
    (text.includes("build") ||
     text.includes("create") ||
     text.includes("finish") ||
     text.includes("complete") ||
     text.includes("write") ||
     text.includes("design"))
  );
}

// 🚀 FIRST CALL
getBtn.addEventListener("click", async () => {

  const userText = input.value.trim();
  if (!userText) return;

  loopLevel = 1;
  messages = [{ role: "user", content: userText }];

  outputBox.innerHTML = "Thinking...";

  const res = await fetch("/api/chat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ messages, loopLevel })
  });

  const data = await res.json();

  messages.push({ role: "assistant", content: data.reply });

  outputBox.innerHTML = `
    <b>You:</b> ${userText}<br><br>
    ${data.reply}
  `;
});

// 🔁 CONTINUE LOOP
continueBtn.addEventListener("click", async () => {

  const userText = reflectionInput.value.trim();
  if (!userText) return;

  if (!isValidCommitment(userText)) {
    outputBox.innerHTML += `
      <br><br><span style="color:red;">Too vague. Be specific with time + action.</span>
    `;
    return;
  }

  loopLevel++;

  messages.push({ role: "user", content: userText });

  outputBox.innerHTML += `<br><br><i>Going deeper...</i>`;

  const res = await fetch("/api/chat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ messages, loopLevel })
  });

  const data = await res.json();

  messages.push({ role: "assistant", content: data.reply });

  outputBox.innerHTML += `
    <br><br><b>You (Reflection):</b> ${userText}<br><br>
    ${data.reply}
  `;
});

</script>

</body>
</html>
