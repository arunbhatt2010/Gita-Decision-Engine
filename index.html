<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
<title>TruthLoop</title>

<style>
body { background:#0f0f0f; color:#fff; font-family:Arial; margin:0; }
.container { max-width:500px; margin:auto; padding:15px; }
h2 { text-align:center; }
.output { height:45vh; overflow-y:auto; background:#000; padding:15px; border-radius:12px; margin-bottom:10px; }
input { width:100%; padding:12px; margin-top:8px; border-radius:8px; border:none; }
button { width:100%; padding:14px; margin-top:10px; background:linear-gradient(45deg, orange, #ff5e00); border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
</style>
</head>

<body>

<div class="container">

<h2>TruthLoop</h2>

<div id="outputBox" class="output"></div>

<input id="mainInput" placeholder="What's really bothering you..." />
<button id="getBtn">Get Clarity</button>

<input id="reflectionInput" placeholder="Answer honestly..." />

<button id="payBtn" style="display:none;">🔒 Unlock Deep Truth (₹19)</button>

</div>

<script>

// ELEMENTS
const input = document.getElementById("mainInput");
const reflectionInput = document.getElementById("reflectionInput");
const outputBox = document.getElementById("outputBox");
const getBtn = document.getElementById("getBtn");
const payBtn = document.getElementById("payBtn");

// STATE (PERSISTENT)
let messages = [];
let loopLevel = 1;

let freeCount = localStorage.getItem("freeCount")
  ? parseInt(localStorage.getItem("freeCount"))
  : 0;

let isPaid = localStorage.getItem("isPaid") === "true";

// 🔥 PAYMENT
async function startPayment() {
  try {

    if (isPaid) {
      await unlockDeepLoop();
      return;
    }

    const res = await fetch("/api/create-order", { method: "POST" });
    const data = await res.json();

    const options = {
      key: data.key,
      amount: data.amount,
      currency: "INR",
      name: "TruthLoop",
      description: "Unlock Deep Clarity",
      order_id: data.id,

      handler: async function () {
        alert("Payment success ✅");

        isPaid = true;
        localStorage.setItem("isPaid", "true");

        await unlockDeepLoop();
      },

      theme: { color: "#ff5e00" }
    };

    const rzp = new Razorpay(options);
    rzp.open();

  } catch (err) {
    console.error(err);
    alert("Payment failed");
  }
}

// ✅ API CALL
async function callAPI() {
  try {
    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ messages, loopLevel })
    });

    const data = await res.json();

    messages.push({ role: "assistant", content: data.reply });

    return data.reply;

  } catch (err) {
    return "⚠️ AI unstable";
  }
}

// 🔓 DEEP LOOP
async function unlockDeepLoop() {
  try {
    const userText = reflectionInput.value.trim();
    if (!userText) return;

    messages.push({ role: "user", content: userText });

    outputBox.innerHTML += "<br><br><i>Going deeper...</i>";

    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ messages, loopLevel: 2 })
    });

    const data = await res.json();

    outputBox.innerHTML += `<br><br>${data.reply}`;

  } catch (err) {
    outputBox.innerHTML += "<br><br>⚠️ Error loading deep response";
  }
}

// 🎯 MAIN FLOW
getBtn.addEventListener("click", async () => {

  const userText = input.value.trim();
  if (!userText) return;

  // 🚫 LIMIT FREE
  if (freeCount >= 2 && !isPaid) {
    outputBox.innerHTML += "<br><br>🔒 Unlock deeper clarity to continue.";
    return;
  }

  loopLevel = 1;
  messages = [{ role: "user", content: userText }];

  outputBox.innerHTML = "Thinking...";

  const reply = await callAPI();

  // ✅ SAVE COUNT
  freeCount++;
  localStorage.setItem("freeCount", freeCount);

  let warning = "";

  if (freeCount === 2 && !isPaid) {
    payBtn.style.display = "block";
    warning = "<br><br>⚠️ You are still not seeing the real problem...";
  }

  outputBox.innerHTML = `
    <b>You:</b> ${userText}<br><br>
    ${reply}
    ${warning}
  `;
});

// BUTTON
payBtn.addEventListener("click", startPayment);

</script>

</body>
  </html>
