<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gita Guidance</title>

<style>
body {
  background:#111;
  color:#fff;
  font-family: Arial;
  padding:15px;
}

.container {
  max-width:500px;
  margin:auto;
}

.chat-box {
  background:#000;
  padding:12px;
  height:300px;
  overflow-y:auto;
  border-radius:10px;
  margin-bottom:10px;
}

/* 🔤 Language */
select {
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border-radius:6px;
  border:none;
  background:#222;
  color:#fff;
}

/* ✍️ Input + mic */
.input-row {
  display:flex;
  gap:8px;
}

input {
  flex:1;
  padding:12px;
  border-radius:6px;
  border:none;
}

.mic-btn {
  padding:12px;
  border:none;
  border-radius:6px;
  background:#222;
  color:#fff;
  cursor:pointer;
}

/* 🔥 Premium Button */
.primary-btn {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(135deg, orange, #ff7b00);
  transition:0.2s;
}

.primary-btn:hover {
  transform:scale(1.02);
}

/* 🎯 Options */
.options {
  margin-top:15px;
}

.option-card {
  background:#1a1a1a;
  padding:14px;
  margin-bottom:10px;
  border-radius:12px;
  border:1px solid #333;
  cursor:pointer;
  transition:0.2s;
}

.option-card:hover {
  border-color:orange;
}

.option-card.active {
  background:orange;
  color:#000;
}

.step-title {
  font-size:14px;
  opacity:0.7;
  margin-bottom:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>Gita Guidance</h2>

<div id="chat" class="chat-box"></div>

<!-- 🔤 Language -->
<select id="lang">
  <option value="english">English</option>
  <option value="hindi">Hindi</option>
  <option value="both">Hindi + English</option>
</select>

<!-- ✍️ Input + mic -->
<div class="input-row">
  <input id="input" placeholder="What’s really bothering you..." />
  <button class="mic-btn" onclick="startVoice()">🎤</button>
</div>

<button class="primary-btn" onclick="showOptions()">
  Understand my problem
</button>

<div id="options" class="options" style="display:none;"></div>

<button id="sendBtn" class="primary-btn" onclick="sendMessage()" style="display:none;">
  Get Guidance
</button>

</div>

<script>

// 🔥 INIT MESSAGE
const chat = document.getElementById("chat");
chat.innerHTML = `
<div style="opacity:0.7;">
You don’t need more advice.<br>
You need clarity.
</div>
`;

let selectedCauses = [];

const causes = [
"Lack of discipline",
"Overthinking",
"Distraction",
"No clear goal",
"Fear / doubt",
"Procrastination",
"Low confidence",
"No routine",
"Mental fatigue",
"Too many goals"
];

// 🎯 Show options
function showOptions() {
  const input = document.getElementById("input").value.trim();
  if (!input) return;

  const optionsDiv = document.getElementById("options");

  optionsDiv.innerHTML = `
    <div class="step-title">Step 2: What could be the real reason?</div>
  `;

  causes.forEach(cause => {
    const card = document.createElement("div");
    card.className = "option-card";
    card.innerText = cause;

    card.onclick = () => {
      card.classList.toggle("active");

      if (selectedCauses.includes(cause)) {
        selectedCauses = selectedCauses.filter(c => c !== cause);
      } else {
        selectedCauses.push(cause);
      }
    };

    optionsDiv.appendChild(card);
  });

  optionsDiv.style.display = "block";
  document.getElementById("sendBtn").style.display = "block";
}

// 🚀 Send
async function sendMessage() {
  const input = document.getElementById("input").value.trim();
  const lang = document.getElementById("lang").value;

  if (!input) return;

  chat.innerHTML += `<div><b>You:</b> ${input}</div>`;
  chat.innerHTML += `<div style="opacity:0.7;">Thinking deeper...</div>`;

  const response = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      messages: [
        { role: "user", content: input },
        { role: "system", content: "LANG: " + lang + " | CAUSES: " + selectedCauses.join(", ") }
      ]
    })
  });

  const data = await response.json();

  chat.innerHTML += `<div><b>Guide:</b> ${data.reply}</div>`;

  document.getElementById("input").value = "";
  document.getElementById("options").style.display = "none";
  document.getElementById("sendBtn").style.display = "none";
  selectedCauses = [];

  chat.scrollTop = chat.scrollHeight;
}

// 🎤 Voice typing
function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-IN";

  recognition.onresult = function(event) {
    document.getElementById("input").value = event.results[0][0].transcript;
  };

  recognition.start();
}

</script>

</body>
  </html>
