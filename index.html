<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<title>TruthLoop</title>

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family:Arial;
  margin:0;
}

.container {
  max-width:500px;
  margin:auto;
  padding:15px;
}

h2 {
  text-align:center;
}

.output {
  height:45vh;
  overflow-y:auto;
  background:#000;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

input {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}

button {
  width:100%;
  padding:14px;
  margin-top:10px;
  background:linear-gradient(45deg, orange, #ff5e00);
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>TruthLoop</h2>

<div id="outputBox" class="output"></div>

<input id="mainInput" placeholder="What's really bothering you..." />
<button id="getBtn">Get Clarity</button>

<input id="reflectionInput" placeholder="Answer honestly..." />

<button onclick="startPayment()">🔒 Go Deeper (₹19)</button>
</div>

<script>
async function startPayment() {
  const res = await fetch("/api/create-order", {
    method: "POST"
  });

  const data = await res.json();

  const options = {
  key: data.key,  // 🔥 यही fix है
  amount: data.amount,
  currency: "INR",
  name: "TruthLoop",
  description: "Unlock Deep Clarity",
  order_id: data.id,

  handler: async function (response) {
    await unlockDeepLoop();
  },

  theme: {
    color: "#ff5e00"
  }
};

    handler: async function (response) {
      // ✅ Payment success → unlock loop
      await unlockDeepLoop();
    },

    theme: {
      color: "#ff5e00"
    }
  };

  const rzp = new Razorpay(options);
  rzp.open();
  }
// ELEMENTS
const input = document.getElementById("mainInput");
const reflectionInput = document.getElementById("reflectionInput");
const outputBox = document.getElementById("outputBox");
const getBtn = document.getElementById("getBtn");
const continueBtn = document.getElementById("continueBtn");

let messages = [];
let loopLevel = 1;

// VALIDATION
function isValidCommitment(text) {
  return (
    text.length > 20 &&
    (text.match(/\d/) || text.toLowerCase().includes("am") || text.toLowerCase().includes("pm")) &&
    (text.includes("build") ||
     text.includes("create") ||
     text.includes("finish") ||
     text.includes("complete") ||
     text.includes("write") ||
     text.includes("design"))
  );
}

// COMMON API CALL (🔥 FIX)
async function callAPI() {
  try {
    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ messages, loopLevel })
    });
// 🔓 UNLOCK DEEP LOOP (PAID)
async function unlockDeepLoop() {
  const userText = reflectionInput.value.trim();
  if (!userText) return;

  messages.push({ role: "user", content: userText });

  outputBox.innerHTML += `<br><br><i>Going deeper...</i>`;

  const res = await fetch("/api/chat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ messages, loopLevel: 2 })
  });

  const data = await res.json();

  outputBox.innerHTML += `
    <br><br>${data.reply}
  `;
  }
    if (!res.ok) {
      throw new Error("API failed");
    }

    const data = await res.json();

    if (!data.reply) {
      throw new Error("Empty response");
    }

    messages.push({ role: "assistant", content: data.reply });

    return data.reply;

  } catch (err) {
    console.error(err);
    return "⚠️ AI unstable. Try again.";
  }
}

// FIRST CALL
getBtn.addEventListener("click", async () => {

  const userText = input.value.trim();
  if (!userText) return;

  loopLevel = 1;
  messages = [{ role: "user", content: userText }];

  outputBox.innerHTML = "Thinking...";

  const reply = await callAPI();

  outputBox.innerHTML = `
    <b>You:</b> ${userText}<br><br>
    ${reply}
  `;
});

// CONTINUE LOOP
continueBtn.addEventListener("click", async () => {

  const userText = reflectionInput.value.trim();
  if (!userText) return;

  if (!isValidCommitment(userText)) {
    outputBox.innerHTML += `
      <br><br><span style="color:red;">Too vague. Be specific with time + action.</span>
    `;
    return;
  }

  loopLevel++;

  messages.push({ role: "user", content: userText });

  outputBox.innerHTML += `<br><br><i>Going deeper...</i>`;

  const reply = await callAPI();

  outputBox.innerHTML += `
    <br><br><b>You (Reflection):</b> ${userText}<br><br>
    ${reply}
  `;
});

</script>
</body>
</html>
