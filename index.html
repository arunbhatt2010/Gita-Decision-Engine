<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
body { background:#0f0f0f; color:#fff; font-family:Arial; margin:0; }
.container { max-width:500px; margin:auto; padding:15px; box-shadow:0 0 20px rgba(255,94,0,0.1); border-radius:12px; }
h2 { text-align:center; }

.output {
  height:40vh;
  overflow-y:auto;
  background:#000;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  line-height:1.8;
  font-size:15px;
}

input,button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button {
  background:linear-gradient(45deg, orange, #ff5e00);
  font-weight:bold;
  cursor:pointer;
}

.small { font-size:12px; color:#aaa; text-align:center; margin-top:5px; }
</style>
</head>

<body>

<div class="container">

<div style="text-align:center; margin-bottom:15px;">
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg-VwI2SYcAKJd9poW1FTNoP_z0J1YXtLt26G8548Ro41EVKY9L4EOw_hZx1K1WdiSmeVYdBBB0JDZdDCfF8AEGAh8CiY49VyKij2mPSv8csI6qsr9Admcjzgd53AYmg8Y3u3PtoT1fwIcSQgqgguENrHngiR8AzohGXVgaXcorGoYUGf2JYPCx99bWWA/s1536/file_00000000756c720baec218a6947d616f.jpeg"
style="width:160px; border-radius:12px;">
<p class="small">Used by creators, founders & decision makers who want clarity, not motivation.</p>
</div>

<h2>TruthLoop</h2>
<p class="small">This is not advice. This is confrontation.</p>

<div id="emailScreen">
<input id="emailInput" placeholder="Enter your email to continue"/>
<button onclick="saveEmail()">Start</button>
</div>

<div id="goalScreen" style="display:none;">
<p>Where are you stuck… really?</p>
<button onclick="selectGoal('Money')">Money</button>
<button onclick="selectGoal('Clarity')">Clarity</button>
<button onclick="selectGoal('Consistency')">Consistency</button>
<button onclick="selectGoal('Overthinking')">Overthinking</button>
</div>

<div id="problemScreen" style="display:none;">
<input id="problemInput" placeholder="Tell clearly what’s not working..." />
<button onclick="saveProblem()">Continue</button>
</div>

<div id="actionScreen" style="display:none;">
<input id="actionInput" placeholder="What did you actually do in last 48 hours?" />
<button onclick="saveAction()">Start</button>
</div>

<div id="mainApp" style="display:none;">
<div id="outputBox" class="output"></div>

<input id="mainInput" placeholder="Don't type what sounds smart. Type what is real." />
<button id="getBtn">Face the truth</button>

<input id="reflectionInput" placeholder="Answer honestly..." />
<button id="nextBtn">Go deeper</button>
</div>

<p class="small">
<a href="/privacy.html">Privacy Policy</a> |
<a href="/terms.html">Terms</a> |
<a href="/refund.html">Refund Policy</a> |
Contact: arunbhatt2010@email.com
</p>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

let userGoal="", userProblem="", userAction="";
let messages=[], loopLevel=1;

const outputBox=document.getElementById("outputBox");
const mainInput=document.getElementById("mainInput");
const reflectionInput=document.getElementById("reflectionInput");

// ✅ FIX 1: format function added
function formatReply(text){
  return text.split("\n").map(l=>`<div style="margin-bottom:10px;">${l}</div>`).join("");
}

// FLOW
window.saveEmail=()=>{
  const email=document.getElementById("emailInput").value.trim();
  if(!email) return alert("Enter email");

  localStorage.setItem("truthloop_email", email);

  // optional backend
  fetch("https://engine.vercel.app/api/saveEmail", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ email })
  });

  emailScreen.style.display="none";
  goalScreen.style.display="block";
};

window.selectGoal=(v)=>{
  userGoal=v;
  goalScreen.style.display="none";
  problemScreen.style.display="block";
};

window.saveProblem=()=>{
  userProblem=document.getElementById("problemInput").value.trim();
  if(!userProblem) return alert("Enter problem");
  problemScreen.style.display="none";
  actionScreen.style.display="block";
};

window.saveAction=()=>{
  userAction=document.getElementById("actionInput").value.trim();
  if(!userAction) return alert("Enter action");
  actionScreen.style.display="none";
  mainApp.style.display="block";
};

// ✅ FIX 2: FULL URL
async function callAPI(){
  const res=await fetch("https://engine.vercel.app/api/chat",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ messages, loopLevel, userGoal, userProblem, userAction })
  });

  const data=await res.json();

  messages.push({role:"assistant",content:data.reply});

  return data.reply;
}

// START
document.getElementById("getBtn").onclick = async ()=>{
  const text=mainInput.value.trim();
  if(!text) return;

  messages=[{role:"user",content:text}];

  outputBox.innerHTML=`<b>You:</b> ${text}<br><br>`;

  const reply=await callAPI();

  outputBox.innerHTML+=formatReply(reply);

  mainInput.value="";
};

// CONTINUE
document.getElementById("nextBtn").onclick = async ()=>{
  const text=reflectionInput.value.trim();
  if(!text) return;

  loopLevel++;

  messages.push({role:"user",content:text});

  outputBox.innerHTML+=`<br><b>You:</b> ${text}<br><br>`;

  const reply=await callAPI();

  outputBox.innerHTML+=formatReply(reply);

  reflectionInput.value="";
};

});
</script>

</body>
  </html>
