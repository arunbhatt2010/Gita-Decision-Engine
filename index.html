<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gita Decisions Engine</title>
<link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      padding-top: 40px;
    }

    .container {
      width: 350px;
      background: #1c1c1c;
      padding: 20px;
      border-radius: 10px;
    }

    .chat-box {
      background: #000;
      padding: 10px;
      height: 300px;
      overflow-y: auto;
      margin-bottom: 10px;
      border-radius: 5px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-bottom: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: orange;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>

</head>
<body>

<div class="container">
  <h2>Gita Guidance</h2>

  <div id="chat" class="chat-box"></div>

  <select id="lang">
    <option value="english">English</option>
    <option value="hindi">Hindi</option>
    <option value="both">Hindi + English</option>
  </select>

  <input id="input" placeholder="Ask your problem..." />

  <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {

  const inputBox = document.getElementById("input");
  const chat = document.getElementById("chat");

  const text = inputBox.value.trim();
  if (!text) return;

  chat.innerHTML += `<div><b>You:</b> ${text}</div>`;
  inputBox.value = "";

  // 🧠 user message add
  messages.push({ role: "user", content: text });

  chat.innerHTML += `<div><b>Guide:</b> Thinking...</div>`;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages: messages
      })
    });

    const data = await res.json();

    const reply = data.reply || "No response";

    // 🧠 assistant message add (VERY IMPORTANT)
    messages.push({ role: "assistant", content: reply });

    // replace Thinking...
    chat.innerHTML = chat.innerHTML.replace(
      "Thinking...",
      reply
    );

  } catch (err) {
    chat.innerHTML = chat.innerHTML.replace(
      "Thinking...",
      "Error"
    );
  }
  }
  }
});
</script>

</body>
</html>
