<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
<title>TruthLoop</title>

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family:Arial;
  margin:0;
}
.container {
  max-width:500px;
  margin:auto;
  padding:15px;
}
h2 {
  text-align:center;
}
.output {
  height:45vh;
  overflow-y:auto;
  background:#000;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}
input {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}
button {
  width:100%;
  padding:14px;
  margin-top:10px;
  background:linear-gradient(45deg, orange, #ff5e00);
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>TruthLoop</h2>

<div id="outputBox" class="output"></div>

<input id="mainInput" placeholder="What's really bothering you..." />
<button id="getBtn">Get Clarity</button>

<input id="reflectionInput" placeholder="Answer honestly..." />

<button id="payBtn" style="display:none;">🔒 Go Deeper (₹19)</button>
</div>

<script>
console.log("Razorpay check:", typeof Razorpay);

// ELEMENTS
const input = document.getElementById("mainInput");
const reflectionInput = document.getElementById("reflectionInput");
const outputBox = document.getElementById("outputBox");
const getBtn = document.getElementById("getBtn");

let messages = [];
let loopLevel = 1;
let isPaid = false;
let freeCount = parseInt(localStorage.getItem("freeCount")) || 0;
const today = new Date().toDateString();
const lastDate = localStorage.getItem("date");

if (lastDate !== today) {
  freeCount = 0;
  localStorage.setItem("date", today);
  localStorage.setItem("freeCount", 0);
}
// 🔥 PAYMENT FIXED
async function startPayment() {
  try {

    if (isPaid) {
      await unlockDeepLoop();
      return;
    }

    if (typeof Razorpay === "undefined") {
      alert("Razorpay not loaded ❌");
      return;
    }

    const res = await fetch("/api/create-order", { method: "POST" });

    if (!res.ok) throw new Error("Order API failed");

    const data = await res.json();

    const options = {
      key: data.key,
      amount: data.amount,
      currency: "INR",
      name: "TruthLoop",
      description: "Unlock Deep Clarity",
      order_id: data.id,
handler: async function () {
  alert("Payment success ✅");

  isPaid = true;

  // 🔥 reset free limit
  localStorage.removeItem("freeCount");

  // 🔓 unlock deep loop
  await unlockDeepLoop();
},

      theme: {
        color: "#ff5e00"
      }
    };

    const rzp = new Razorpay(options);
    rzp.open();

  } catch (err) {
    console.error(err);
    alert("Payment failed: " + err.message);
  }
}

// ✅ API CALL
async function callAPI() {
  try {
    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ messages, loopLevel })
    });

    if (!res.ok) throw new Error("API failed");

    const data = await res.json();

    messages.push({ role: "assistant", content: data.reply });

    return data.reply;

  } catch (err) {
    console.error(err);
    return "⚠️ AI unstable. Try again.";
  }
}

// 🔓 DEEP LOOP FIX (FORMAT)
async function unlockDeepLoop() {
  try {
    const userText = reflectionInput.value.trim();

    if (!userText) {
      outputBox.innerHTML += "<br><br>⚠️ Enter reflection first";
      return;
    }

    messages.push({ role: "user", content: userText });

    outputBox.innerHTML += "<br><br><i>Going deeper...</i>";

    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ messages, loopLevel: 2 })
    });

    const data = await res.json();

    const formattedReply = data.reply
      .replace(/\n/g, "<br>");

    outputBox.innerHTML += `<br><br>${formattedReply}`;

  } catch (err) {
    console.error(err);
    outputBox.innerHTML += "<br><br>⚠️ Error loading deep response";
  }
}

// FIRST CALL
getBtn.addEventListener("click", async () => {
  const userText = input.value.trim();
  if (!userText) return;

  if (freeCount >= 2 && !isPaid) {
    outputBox.innerHTML += "<br><br>🔒 Unlock deeper clarity to continue.";
    return;
  }

  loopLevel = 1;
  messages = [{ role: "user", content: userText }];

  outputBox.innerHTML = "Thinking...";

  const reply = await callAPI();

  freeCount++;
localStorage.setItem("freeCount", freeCount);

  let warning = "";

  if (freeCount === 2) {
    document.getElementById("payBtn").style.display = "block";
    warning = "<br><br>⚠️ You are still not seeing the real problem...";
  }

  // ✅ FORMAT FIX
  const formattedReply = reply.replace(/\n/g, "<br>");

  outputBox.innerHTML = `
    <b>You:</b> ${userText}<br><br>
    ${formattedReply}
    ${warning}
  `;
});

document.getElementById("payBtn").addEventListener("click", startPayment);

</script>

</body>
  </html>
