<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gita Guidance</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  display: flex;
  justify-content: center;
  padding-top: 40px;
}

.container {
  width: 350px;
  background: #1c1c1c;
  padding: 20px;
  border-radius: 10px;
}

.chat-box {
  background: #000;
  padding: 10px;
  height: 300px;
  overflow-y: auto;
  margin-bottom: 10px;
  border-radius: 5px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-bottom: 5px;
  border-radius: 5px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  background: orange;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h2>Gita Guidance</h2>

  <div id="chat" class="chat-box"></div>

  <select id="lang">
    <option value="english">English</option>
    <option value="hindi">Hindi</option>
  </select>

  <input id="input" placeholder="Ask your problem..." />

  <button onclick="sendMessage()">Send</button>
</div>

<script>

let messages = []; // 🔥 IMPORTANT (memory)

async function sendMessage() {

  const inputBox = document.getElementById("input");
  const chat = document.getElementById("chat");
  const lang = document.getElementById("lang").value;

  const text = inputBox.value.trim();
  if (!text) return;

  // show user message
  chat.innerHTML += `<div><b>You:</b> ${text}</div>`;
  inputBox.value = "";

  // store user message
  messages.push({ role: "user", content: text });

  // unique thinking id
  const thinkingId = "msg-" + Date.now();

  chat.innerHTML += `<div id="${thinkingId}"><b>Guide:</b> Thinking...</div>`;

  try {

    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages: messages,
        lang: lang
      })
    });

    const data = await res.json();

    const reply = data.reply || "No response";

    // store AI reply
    messages.push({ role: "assistant", content: reply });

    // replace thinking
    document.getElementById(thinkingId).innerHTML =
      `<b>Guide:</b> ${reply}`;

  } catch (err) {

    document.getElementById(thinkingId).innerHTML =
      `<b>Guide:</b> Error`;

  }
}

// ENTER key support
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  }
});

</script>

</body>
</html>
