<script>
let isPaid = true; // testing mode (remove later)

// DEVICE ID
let deviceId = localStorage.getItem("deviceId");
if (!deviceId) {
  deviceId = "device_" + Math.random().toString(36).substring(2);
  localStorage.setItem("deviceId", deviceId);
}

console.log("Razorpay check:", typeof Razorpay);

// ELEMENTS
const input = document.getElementById("mainInput");
const reflectionInput = document.getElementById("reflectionInput");
const outputBox = document.getElementById("outputBox");
const getBtn = document.getElementById("getBtn");
const payBtn = document.getElementById("payBtn");

let messages = [];
let loopLevel = 1;

// ✅ FIXED STORAGE (device based)
let freeCount = parseInt(localStorage.getItem("freeCount_" + deviceId)) || 0;
const today = new Date().toDateString();
const lastDate = localStorage.getItem("date_" + deviceId);

// ✅ FIXED DATE RESET
if (lastDate !== today) {
  freeCount = 0;
  localStorage.setItem("date_" + deviceId, today);
  localStorage.setItem("freeCount_" + deviceId, 0);
}

// 🔥 PAYMENT FIXED
async function startPayment() {
  try {
    if (isPaid) {
      await unlockDeepLoop();
      return;
    }

    if (typeof Razorpay === "undefined") {
      alert("Razorpay not loaded ❌");
      return;
    }

    const res = await fetch("/api/create-order", { method: "POST" });
    if (!res.ok) throw new Error("Order API failed");

    const data = await res.json();

    const options = {
      key: data.key,
      amount: data.amount,
      currency: "INR",
      name: "TruthLoop",
      description: "Unlock Deep Clarity",
      order_id: data.id,

      handler: async function () {
        alert("Payment success ✅");

        isPaid = true;

        // ✅ FIXED RESET
        localStorage.removeItem("freeCount_" + deviceId);

        await unlockDeepLoop();
      },

      theme: { color: "#ff5e00" }
    };

    const rzp = new Razorpay(options);
    rzp.open();

  } catch (err) {
    console.error(err);
    alert("Payment failed: " + err.message);
  }
}

// ✅ API CALL
async function callAPI() {
  try {
    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ messages, loopLevel })
    });

    if (!res.ok) throw new Error("API failed");

    const data = await res.json();
    messages.push({ role: "assistant", content: data.reply });

    return data.reply;

  } catch (err) {
    console.error(err);
    return "⚠️ AI unstable. Try again.";
  }
}

// 🔓 DEEP LOOP
async function unlockDeepLoop() {
  try {
    const userText = reflectionInput.value.trim();

    if (!userText) {
      outputBox.innerHTML += "<br><br>⚠️ Enter reflection first";
      return;
    }

    messages.push({ role: "user", content: userText });

    outputBox.innerHTML += "<br><br><i>Going deeper...</i>";

    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ messages, loopLevel: 2 })
    });

    const data = await res.json();

    const formattedReply = data.reply.replace(/\n/g, "<br>");

    outputBox.innerHTML += `<br><br>${formattedReply}`;

  } catch (err) {
    console.error(err);
    outputBox.innerHTML += "<br><br>⚠️ Error loading deep response";
  }
}

// FIRST CALL
getBtn.addEventListener("click", async () => {
  const userText = input.value.trim();
  if (!userText) return;

  // 🚫 LIMIT CHECK
  if (freeCount >= 2 && !isPaid) {
    outputBox.innerHTML += `
    <br><br>
    ⚠️ You're repeating the same pattern again.<br><br>

    Right now, you're seeing the obvious layer…<br>
    but the real reason is still hidden.<br><br>

    Most people stop here —<br>
    and keep repeating the same problem again and again.<br><br>

    🔒 Most people never reach this level.<br><br>

    Do you want the real answer — or stay stuck here?
    `;

    if (payBtn) payBtn.style.display = "block";

    return;
  }

  loopLevel = 1;
  messages = [{ role: "user", content: userText }];

  outputBox.innerHTML = "Thinking...";

  const reply = await callAPI();

  // ✅ COUNT FIX
  freeCount++;
  localStorage.setItem("freeCount_" + deviceId, freeCount);

  let warning = "";

  if (freeCount === 2 && !isPaid) {
    if (payBtn) payBtn.style.display = "block";
    warning = "<br><br>⚠️ You are still not seeing the real problem...";
  }

  outputBox.innerHTML = `
    <b>You:</b> ${userText}<br><br>
    ${reply}
    ${warning}
  `;
});

payBtn.addEventListener("click", startPayment);
    </script>
