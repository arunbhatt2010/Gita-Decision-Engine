<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gita Guidance</title>

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family:Arial;
  margin:0;
}
.container {
  max-width:500px;
  margin:auto;
  padding:15px;
}
h2{text-align:center;}
.chat-box {
  height:45vh;
  overflow-y:auto;
  background:#000;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}
select, input {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}
.primary-btn {
  width:100%;
  padding:14px;
  margin-top:10px;
  background:linear-gradient(45deg, orange, #ff5e00);
  border:none;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h2>Gita Guidance</h2>

<div id="chat" class="chat-box">
<div style="opacity:0.7;">
You don’t need more advice.<br>
You need clarity.
</div>
</div>

<select id="lang">
<option value="en">English</option>
<option value="hi">Hindi</option>
</select>

<input id="input" placeholder="What's really bothering you..." />

<button onclick="sendMessage()" class="primary-btn">Get Guidance</button>

</div>

<script>

async function sendMessage(){

  const input = document.getElementById("input").value.trim();
  const lang = document.getElementById("lang").value;
  const chat = document.getElementById("chat");

  if(!input) return;

  chat.innerHTML += `<div><b>You:</b> ${input}</div>`;
  chat.innerHTML += `<div style="opacity:0.6;">Thinking...</div>`;

  try {

    const response = await fetch("/api/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        messages: [
          {
            role:"user",
            content: `User problem: ${input}\nLanguage: ${lang}`
          }
        ]
      })
    });

    if(!response.ok){
      chat.innerHTML += `<div>❌ API Error (${response.status})</div>`;
      return;
    }

    const data = await response.json();

    chat.innerHTML += data.reply;
  } catch(err){
    chat.innerHTML += `<div>❌ Fetch failed</div>`;
  }

  document.getElementById("input").value = "";
  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
