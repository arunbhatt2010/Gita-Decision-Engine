<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TruthLoop</title>

<!-- 🔥 GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-RBMQ2F6P9Q"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-RBMQ2F6P9Q');
</script>

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family:Arial;
  margin:0;
}
.container {
  max-width:500px;
  margin:auto;
  padding:15px;
}
h2 { text-align:center; }
.output {
  height:45vh;
  overflow-y:auto;
  background:#000;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  line-height:1.6;
  font-size:15px;
}
input {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}
button {
  width:100%;
  padding:14px;
  margin-top:10px;
  background:linear-gradient(45deg, orange, #ff5e00);
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>TruthLoop</h2>

<div id="goalScreen">
  <p>Where are you stuck right now and avoiding fixing it?</p>
  <button onclick="selectGoal('Money stuck / not growing')">Money stuck / not growing</button>
  <button onclick="selectGoal('No clarity, just confusion')">No clarity, just confusion</button>
  <button onclick="selectGoal('Keep starting, can’t stay consistent')">Keep starting</button>
  <button onclick="selectGoal('Overthinking, no action')">Overthinking</button>
  <button onclick="selectGoal('Something else')">Something else</button>
</div>

<div id="problemScreen" style="display:none;">
  <input id="problemInput" placeholder="What’s actually not working?" />
  <button onclick="saveProblem()">Next</button>
</div>

<div id="actionScreen" style="display:none;">
  <input id="actionInput" placeholder="What did you do in last 48 hours?" />
  <button onclick="saveAction()">Start</button>
</div>

<div id="mainApp" style="display:none;">
  <div id="outputBox" class="output"></div>

  <input id="mainInput" placeholder="Say it clearly. No hiding." />
  <button id="getBtn">Face It</button>

  <input id="reflectionInput" placeholder="Answer honestly..." />
  <button id="nextBtn">Continue</button>

  <button id="payBtn" style="display:none;">⚠️ Unlock</button>
  <button id="newSessionBtn" style="display:none;">🔄 Start New Problem</button>
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

let userGoal = "";
let userProblem = "";
let userAction = "";

let messages = [];
let loopLevel = 1;
let hasPaid = false;

const goalScreen = document.getElementById("goalScreen");
const problemScreen = document.getElementById("problemScreen");
const actionScreen = document.getElementById("actionScreen");
const mainApp = document.getElementById("mainApp");

const problemInput = document.getElementById("problemInput");
const actionInput = document.getElementById("actionInput");
const mainInput = document.getElementById("mainInput");
const reflectionInput = document.getElementById("reflectionInput");

const outputBox = document.getElementById("outputBox");
const getBtn = document.getElementById("getBtn");
const nextBtn = document.getElementById("nextBtn");
const payBtn = document.getElementById("payBtn");
const newSessionBtn = document.getElementById("newSessionBtn");

// FORMAT
function formatReply(text) {
  return text
    .split("\n")
    .filter(line => line.trim() !== "")
    .map(line => `<div style="margin-bottom:14px;">${line}</div>`)
    .join("");
}

// FLOW
window.selectGoal = function(val){
  userGoal = val;
  goalScreen.style.display = "none";
  problemScreen.style.display = "block";
}

window.saveProblem = function(){
  const val = problemInput.value.trim();
  if(!val) return alert("Enter problem");
  userProblem = val;
  problemScreen.style.display = "none";
  actionScreen.style.display = "block";
}

window.saveAction = function(){
  const val = actionInput.value.trim();
  if(!val) return alert("Enter action");
  userAction = val;
  actionScreen.style.display = "none";
  mainApp.style.display = "block";
}

// API
async function callAPI(){

  // 🔥 LOOP TRACK
  gtag('event', 'loop_reached', { loop: loopLevel });

  const res = await fetch("/api/chat",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      messages,
      loopLevel,
      userGoal,
      userProblem,
      userAction
    })
  });

  const data = await res.json();
  messages.push({ role:"assistant", content:data.reply });

  if (loopLevel >= 3 && !hasPaid) {
    payBtn.style.display = "block";
    newSessionBtn.style.display = "block";

    payBtn.innerText = loopLevel === 3 
      ? "⚠️ Unlock Clarity (₹49)" 
      : "🔥 Unlock Full Execution (₹99)";

    nextBtn.disabled = true;
  }

  return data.reply;
}

// LOOP 1
getBtn.addEventListener("click", async ()=>{
  const text = mainInput.value.trim();
  if(!text) return;

  gtag('event', 'face_it_clicked');

  loopLevel = 1;
  hasPaid = false;
  messages = [{ role:"user", content:text }];
  outputBox.innerHTML = "";

  const reply = await callAPI();

  outputBox.innerHTML = `<b>You:</b> ${text}<br><br>${formatReply(reply)}`;
});

// NEXT LOOP
nextBtn.addEventListener("click", async ()=>{
  const text = reflectionInput.value.trim();
  if(!text) return;

  if (loopLevel === 3 && !hasPaid) {
    alert("⚠️ Unlock required");
    return;
  }

  loopLevel++;
  messages.push({ role:"user", content:text });

  outputBox.innerHTML += `<br><br><b>You:</b> ${text}<br>`;

  const reply = await callAPI();
  outputBox.innerHTML += `<br>${formatReply(reply)}`;

  reflectionInput.value = "";
});

// PAYMENT
payBtn.addEventListener("click", ()=>{
  gtag('event', 'payment_clicked');

  alert("✅ Test Payment Successful");

  hasPaid = true;
  payBtn.style.display = "none";
  nextBtn.disabled = false;
});

// RESET
newSessionBtn.addEventListener("click", ()=>{
  gtag('event', 'new_problem_started');

  messages = [];
  loopLevel = 1;
  hasPaid = false;

  outputBox.innerHTML = "";
  mainInput.value = "";
  reflectionInput.value = "";

  payBtn.style.display = "none";
  newSessionBtn.style.display = "none";
});

});
</script>

</body>
  </html>
